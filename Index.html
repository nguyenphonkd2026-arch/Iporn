<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>iPhone Pro Max - 40+ Tính Năng | Wi-Fi | Dynamic Island</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 30% 10%, #0a0f1a, #05080f);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', Helvetica, sans-serif;
            padding: 20px;
        }

        .device-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .model-selector {
            position: absolute;
            top: -50px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 12px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            padding: 8px 20px;
            border-radius: 40px;
            z-index: 200;
        }
        .model-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .model-btn.active {
            background: #007aff;
            color: white;
            box-shadow: 0 2px 8px rgba(0,122,255,0.3);
        }
        .model-btn:active { transform: scale(0.95); }

        .iphone-device {
            position: relative;
            background: #111;
            border-radius: 48px;
            box-shadow: 0 30px 50px -20px rgba(0,0,0,0.6), 0 0 0 8px #3a3a3c, 0 0 0 14px #1c1c1e;
            overflow: hidden;
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .iphone-device.model-iphone17 { width: 390px; height: 820px; border-radius: 48px; }
        .iphone-device.model-iphone15 { width: 380px; height: 780px; border-radius: 44px; }
        .iphone-device.model-iphone14 { width: 360px; height: 740px; border-radius: 42px; }
        .iphone-device.model-iphonefold { width: 520px; height: 800px; border-radius: 48px; }
        .iphone-device.model-iphonefold.folded { width: 380px; }

        .screen-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            border-radius: inherit;
            overflow-y: auto;
            overflow-x: hidden;
            scroll-behavior: smooth;
            scrollbar-width: thin;
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1), opacity 0.25s ease;
        }
        .screen-enter { transform: scale(0.94); opacity: 0; }
        .screen-enter-active { transform: scale(1); opacity: 1; }
        .screen-exit { transform: scale(1); opacity: 1; }
        .screen-exit-active { transform: scale(0.94); opacity: 0; }

        .dynamic-island {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 112px;
            height: 36px;
            background: #111;
            border-radius: 30px;
            z-index: 20;
            pointer-events: none;
            box-shadow: inset 0 0 0 0.5px rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .wave-bar {
            width: 3px;
            height: 12px;
            background: rgba(255,255,255,0.6);
            border-radius: 2px;
            transition: height 0.05s ease;
        }
        .wave-bar.active {
            background: #34C759;
            box-shadow: 0 0 6px #34C759;
        }
        .dynamic-island.music-active {
            background: rgba(52,199,89,0.2);
            box-shadow: 0 0 12px #34C759;
        }
        .model-iphone17 .dynamic-island { width: 108px; height: 34px; top: 13px; border-radius: 28px; }
        .model-iphone15 .dynamic-island { width: 112px; height: 36px; top: 12px; }
        .model-iphone14 .dynamic-island { width: 104px; height: 32px; top: 12px; border-radius: 26px; }
        .model-iphonefold .dynamic-island { width: 118px; height: 38px; top: 12px; }

        .fold-button {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 52px;
            height: 52px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 26px;
            cursor: pointer;
            z-index: 200;
            border: 0.5px solid rgba(255,255,255,0.2);
        }
        .fold-button:active { transform: scale(0.9); }
        .fold-button.hidden { display: none; }

        .control-center {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(30,30,38,0.92);
            backdrop-filter: blur(32px);
            border-radius: 32px 32px 0 0;
            padding: 22px 20px 28px;
            z-index: 100;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.2,0.9,0.4,1.1);
            border-top: 0.5px solid rgba(255,255,255,0.15);
        }
        .control-center.active { transform: translateY(0); }
        .control-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; margin-bottom: 24px; }
        .control-item { background: rgba(255,255,255,0.18); border-radius: 22px; padding: 14px 8px; text-align: center; color: white; cursor: pointer; transition: 0.12s; }
        .control-item:active { transform: scale(0.94); background: rgba(255,255,255,0.32); }
        .control-icon { font-size: 30px; margin-bottom: 6px; }
        .control-label { font-size: 11px; font-weight: 500; }
        .control-slider { margin-top: 18px; padding: 14px 16px; background: rgba(255,255,255,0.12); border-radius: 28px; }
        .brightness-slider, .volume-slider { display: flex; align-items: center; gap: 14px; color: white; margin-bottom: 14px; }
        input[type="range"] { flex: 1; height: 4px; -webkit-appearance: none; background: rgba(255,255,255,0.3); border-radius: 5px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 20px; background: white; cursor: pointer; }
        .control-close { text-align: center; margin-top: 16px; color: rgba(255,255,255,0.7); font-size: 13px; cursor: pointer; }

        .lock-screen {
            background: linear-gradient(145deg, #14141a, #1f1f28);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 70px 20px 50px;
            text-align: center;
            height: 100%;
        }
        .lock-time { font-size: 78px; font-weight: 700; letter-spacing: -2px; margin-bottom: 10px; }
        .lock-date { font-size: 18px; opacity: 0.75; margin-bottom: 45px; }
        .lock-notification { background: rgba(255,255,255,0.12); backdrop-filter: blur(24px); border-radius: 28px; padding: 14px 22px; width: 90%; margin: 16px auto; text-align: left; }
        .swipe-to-unlock { margin-top: auto; margin-bottom: 45px; font-size: 16px; display: flex; flex-direction: column; align-items: center; gap: 12px; color: rgba(255,255,255,0.8); }
        .swipe-indicator { width: 44px; height: 5px; background: rgba(255,255,255,0.6); border-radius: 10px; animation: bounce 1.2s infinite; }
        @keyframes bounce { 0%,100% { transform: translateY(0); opacity: 0.6; } 50% { transform: translateY(8px); opacity: 1; } }

        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 12px 20px 8px 20px;
            font-size: 15px;
            font-weight: 590;
            color: #1c1c1e;
            background: rgba(242,242,246,0.96);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            row-gap: 20px;
            column-gap: 12px;
            padding: 20px 20px 30px 20px;
        }
        .app-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: transform 0.12s;
        }
        .app-icon:active { transform: scale(0.94); }
        .icon-bg {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.08);
        }
        .app-name { font-size: 10px; font-weight: 500; color: #1c1c1e; }

        .dock {
            background: rgba(255,255,255,0.78);
            backdrop-filter: blur(24px);
            border-radius: 38px;
            margin: 8px 16px 28px 16px;
            padding: 8px 16px;
            display: flex;
            justify-content: space-around;
        }
        .dock-icon { cursor: pointer; text-align: center; transition: 0.1s; }
        .dock-icon:active { transform: scale(0.9); }
        .dock-icon .icon-bg { width: 50px; height: 50px; border-radius: 16px; background: #e5e5ea; font-size: 24px; }

        /* Settings & Wi-Fi */
        .settings-screen, .wifi-screen, .home-screen, .messages-screen, .music-screen, .calculator-screen, .clock-screen, .camera-screen, .photos-screen, .weather-screen, .calendar-screen, .phone-screen, .game-screen, .utility-screen, .notes-screen {
            background: #F2F2F6;
            min-height: 100%;
        }
        .settings-header, .wifi-header, .messages-header, .notes-header, .calculator-header, .clock-header, .camera-header, .photos-header, .weather-header, .calendar-header, .music-header, .phone-header, .game-header, .utility-header {
            padding: 16px 20px 8px 20px;
            background: #F2F2F6;
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .settings-header h1, .wifi-header h1, .messages-header h1, .notes-header h1, .calculator-header h1, .clock-header h1, .camera-header h1, .photos-header h1, .weather-header h1, .calendar-header h1, .music-header h1, .phone-header h1, .game-header h1, .utility-header h1 {
            font-size: 26px;
            font-weight: 700;
            margin: 0;
        }
        .back-btn {
            font-size: 32px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
        }
        .back-btn:active { background: #E5E5EA; }
        .settings-group {
            background: white;
            margin: 8px 16px;
            border-radius: 12px;
            overflow: hidden;
        }
        .settings-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 0.5px solid #E5E5EA;
            cursor: pointer;
        }
        .settings-item:last-child { border-bottom: none; }
        .settings-left { display: flex; align-items: center; gap: 12px; }
        .settings-icon { width: 28px; font-size: 18px; text-align: center; }
        .settings-label { font-size: 16px; font-weight: 500; }
        .settings-value { font-size: 15px; color: #8E8E93; }
        .toggle-switch {
            width: 48px;
            height: 28px;
            background: #E5E5EA;
            border-radius: 28px;
            position: relative;
            transition: 0.2s;
            cursor: pointer;
        }
        .toggle-switch.active { background: #34C759; }
        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 24px;
            top: 2px;
            left: 2px;
            transition: 0.2s;
        }
        .toggle-switch.active::after { left: 22px; }

        /* Wi-Fi Screen */
        .wifi-list {
            background: white;
            margin: 8px 16px;
            border-radius: 12px;
            overflow: hidden;
        }
        .wifi-network {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-bottom: 0.5px solid #E5E5EA;
            cursor: pointer;
            transition: background 0.1s;
        }
        .wifi-network:active { background: #E5E5EA; }
        .wifi-network:last-child { border-bottom: none; }
        .wifi-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .wifi-icon { font-size: 20px; width: 28px; text-align: center; }
        .wifi-name { font-size: 17px; font-weight: 500; }
        .wifi-lock { font-size: 12px; color: #8E8E93; margin-left: 6px; }
        .wifi-status { font-size: 14px; color: #007aff; }
        .wifi-connected { color: #34C759; }
        .wifi-section-title {
            font-size: 13px;
            font-weight: 500;
            color: #8E8E93;
            padding: 16px 16px 8px 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .wifi-toggle-card {
            background: white;
            margin: 8px 16px;
            border-radius: 12px;
            overflow: hidden;
        }

        /* Messages */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 15px;
        }
        .message.sent {
            background: #007aff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message.received {
            background: #E5E5EA;
            color: #000;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .message-time { font-size: 10px; margin-top: 4px; opacity: 0.7; }
        .input-area {
            background: white;
            padding: 12px 16px;
            border-top: 0.5px solid #E5E5EA;
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            border: none;
            background: #F2F2F6;
            padding: 10px 14px;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
        }
        .send-btn {
            background: #007aff;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
        }

        /* Music Player */
        .music-player {
            background: white;
            margin: 20px;
            border-radius: 28px;
            padding: 20px;
            text-align: center;
        }
        .music-cover { font-size: 70px; margin-bottom: 12px; }
        .music-title { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
        .music-artist { font-size: 14px; color: #8E8E93; margin-bottom: 20px; }
        .music-controls {
            display: flex;
            justify-content: center;
            gap: 28px;
            margin-bottom: 20px;
        }
        .music-btn {
            background: #007aff;
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50px;
            font-size: 20px;
            cursor: pointer;
        }
        .music-btn.play-btn { background: #34C759; width: 64px; height: 64px; font-size: 28px; }
        .music-progress {
            width: 100%;
            height: 4px;
            background: #E5E5EA;
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
        }
        .music-progress-bar {
            width: 0%;
            height: 100%;
            background: #007aff;
            transition: width 0.1s linear;
        }
        .music-time {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 12px;
            color: #8E8E93;
        }
        .song-list {
            margin: 16px;
        }
        .song-item {
            background: white;
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        /* Calculator */
        .calculator {
            background: #1c1c1e;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
        }
        .calc-display {
            background: #1c1c1e;
            color: white;
            font-size: 64px;
            text-align: right;
            padding: 20px;
            font-weight: 300;
        }
        .calc-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        .calc-btn {
            background: #2c2c2e;
            color: white;
            font-size: 30px;
            padding: 18px;
            text-align: center;
            border-radius: 50px;
            cursor: pointer;
        }
        .calc-btn.operator { background: #ff9f0a; }
        .calc-btn.clear { background: #ff3b30; }

        /* Clock */
        .clock-display { font-size: 60px; text-align: center; padding: 40px; font-weight: 300; }
        .world-clock { background: white; margin: 16px; border-radius: 16px; padding: 14px; }
        .timer-control {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 16px;
        }
        .timer-btn {
            background: #007aff;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
        }
        .stopwatch { text-align: center; margin: 16px; }
        .stopwatch-display { font-size: 32px; font-family: monospace; margin-bottom: 12px; }

        /* Camera */
        .camera-preview {
            background: #000;
            color: white;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Photos */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            padding: 2px;
        }
        .photo-item {
            aspect-ratio: 1;
            background: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            cursor: pointer;
        }

        /* Weather */
        .weather-card {
            background: white;
            margin: 20px;
            border-radius: 28px;
            padding: 24px;
            text-align: center;
        }
        .weather-temp { font-size: 64px; font-weight: 300; }

        /* Calendar */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            background: white;
            margin: 16px;
            border-radius: 16px;
            padding: 12px;
        }
        .calendar-day { padding: 10px; font-size: 14px; }
        .calendar-today { background: #007aff; color: white; border-radius: 28px; }

        /* Phone */
        .contact-list { margin: 16px; }
        .contact-item {
            background: white;
            padding: 14px;
            margin-bottom: 8px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .contact-avatar {
            width: 44px;
            height: 44px;
            background: #007aff;
            border-radius: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }

        /* Notes */
        .notes-list { padding: 16px; }
        .note-item {
            background: white;
            padding: 14px;
            margin-bottom: 10px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
        }
        .add-note {
            margin: 12px 16px;
            background: #007aff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Games */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            padding: 16px;
        }
        .game-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
        }
        .game-card:active { transform: scale(0.96); }
        .game-icon { font-size: 48px; margin-bottom: 12px; }
        .game-name { font-weight: 600; }

        /* Flappy Bird */
        .flappy-game {
            background: #87CEEB;
            height: 400px;
            position: relative;
            margin: 16px;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
        }
        .flappy-bird {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #FFD700;
            border-radius: 50%;
            left: 80px;
        }
        .flappy-pipe {
            position: absolute;
            width: 60px;
            background: #228B22;
        }
        .flappy-score {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 1px black;
        }

        /* Tic Tac Toe */
        .tictac-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            width: 250px;
            margin: 20px auto;
        }
        .tictac-cell {
            background: white;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            border-radius: 16px;
            cursor: pointer;
        }

        /* Memory Card */
        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 16px;
        }
        .memory-card {
            background: #007aff;
            aspect-ratio: 1;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            transition: 0.1s;
        }
        .memory-card.flipped { background: white; }

        /* Guess Number */
        .guess-input {
            padding: 12px;
            border-radius: 30px;
            border: 1px solid #ccc;
            width: 80%;
            margin: 10px;
            text-align: center;
            font-size: 18px;
        }

        /* BMI, QR, Todo */
        .utility-input {
            padding: 12px;
            border-radius: 30px;
            border: 1px solid #ccc;
            width: 100%;
            margin: 8px 0;
        }
        .todo-item {
            background: white;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;

</div>
<div id="toastMsg" class="toast-msg"></div>

<script>
    // ==================== STATE ====================
    let currentScreen = 'lock';
    let animationInProgress = false;
    let controlCenterOpen = false;
    let isFolded = false;
    let currentModel = 'iphone15';
    let darkMode = false;
    let flashlightOn = false;
    
    // Settings
    let wifiEnabled = true;
    let bluetoothEnabled = true;
    let airplaneMode = false;
    let cellularEnabled = true;
    let currentWifiNetwork = 'iPhone 15 Pro';
    let availableNetworks = [
        { name: 'iPhone 15 Pro', secured: true, connected: true, icon: '🛒' },
        { name: 'Wi-Fi Nhà', secured: true, connected: false, icon: '🚀' },
        { name: 'Văn phòng', secured: false, connected: false, icon: '💼' },
        { name: 'Cafe Wi-Fi', secured: true, connected: false, icon: '☕' },
        { name: 'Apple Store', secured: false, connected: false, icon: '🍎' }
    ];
    
    // Messages
    let messages = [
        { text: "Chào bạn! iPhone 15 Pro đã sẵn sàng!", sender: "received", time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) },
        { text: "Có 40+ tính năng mới đấy! Thử ngay nhé 😊", sender: "received", time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) }
    ];
    
    // Notes
    let notes = [
        { id: 1, title: "40+ tính năng", content: "Wi-Fi, Music, Games, BMI, QR, Todo..." },
        { id: 2, title: "iPhone Fold", content: "Màn hình siêu rộng" }
    ];
    
    // Todo List
    let todos = [
        { id: 1, text: "Thử tính năng Wi-Fi", done: false },
        { id: 2, text: "Chơi game Flappy Bird", done: false },
        { id: 3, text: "Kiểm tra BMI", done: false }
    ];
    
    // Music
    let isPlaying = false;
    let currentSongIndex = 0;
    let currentTime = 0;
    let songDuration = 210;
    let musicInterval = null;
    const songs = [
        { name: "Blinding Lights", artist: "The Weeknd", duration: 210 },
        { name: "Shape of You", artist: "Ed Sheeran", duration: 233 },
        { name: "Flowers", artist: "Miley Cyrus", duration: 200 },
        { name: "Anti-Hero", artist: "Taylor Swift", duration: 191 }
    ];
    
    // Calculator
    let calcDisplay = "0";
    
    // Timer & Stopwatch
    let timerSeconds = 0;
    let timerIntervalId = null;
    let stopwatchSeconds = 0;
    let stopwatchIntervalId = null;
    
    // Game states
    let flappyScore = 0;
    let flappyGameRunning = false;
    let flappyBirdTop = 200;
    let flappyVelocity = 0;
    let flappyPipeX = 380;
    let flappyPipeHeight = 150;
    let flappyGameLoop = null;
    let tictacBoard = Array(9).fill('');
    let tictacTurn = 'X';
    let tictacGameEnd = false;
    let memoryCards = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼'];
    let memoryFlipped = [];
    let memoryMatched = [];
    let guessSecret = Math.floor(Math.random() * 100) + 1;
    
    const iphoneDevice = document.getElementById('iphoneDevice');
    const screenContainer = document.getElementById('screenContainer');
    const toast = document.getElementById('toastMsg');
    const homeIndicator = document.getElementById('homeIndicator');
    const foldButton = document.getElementById('foldButton');
    const controlCenter = document.getElementById('controlCenter');
    const dynamicIsland = document.getElementById('dynamicIsland');
    const waveBars = [document.getElementById('wave1'), document.getElementById('wave2'), document.getElementById('wave3'), document.getElementById('wave4'), document.getElementById('wave5'), document.getElementById('wave6')];
    
    function showToast(msg, duration = 1500) {
        toast.textContent = msg;
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', duration);
    }
    
    function startWaveAnimation() {
        if (musicInterval) clearInterval(musicInterval);
        musicInterval = setInterval(() => {
            if (isPlaying) {
                waveBars.forEach(bar => {
                    const h = Math.floor(Math.random() * 18) + 6;
                    bar.style.height = h + 'px';
                    if (h > 14) bar.classList.add('active');
                    else bar.classList.remove('active');
                });
                dynamicIsland.classList.add('music-active');
            } else {
                waveBars.forEach(bar => { bar.style.height = '12px'; bar.classList.remove('active'); });
                dynamicIsland.classList.remove('music-active');
            }
        }, 150);
    }
    
    function applyDarkMode() {
        if (darkMode) document.body.style.background = '#1c1c1e';
        else document.body.style.background = 'radial-gradient(circle at 30% 10%, #0a0f1a, #05080f)';
    }
    
    function toggleDarkMode() { darkMode = !darkMode; applyDarkMode(); showToast(darkMode ? '🌙 Chế độ tối' : '☀️ Chế độ sáng', 800); }
    
    function setModel(model) {
        currentModel = model;
        iphoneDevice.classList.remove('model-iphone17', 'model-iphone15', 'model-iphone14', 'model-iphonefold');
        iphoneDevice.classList.add(`model-${model}`);
        if (model === 'iphone17') currentWifiNetwork = 'iPhone 17 Pro Max';
        else if (model === 'iphone15') currentWifiNetwork = 'iPhone 15 Pro';
        else if (model === 'iphone14') currentWifiNetwork = 'iPhone 14 Pro';
        else if (model === 'iphonefold') currentWifiNetwork = 'iPhone Fold 5G';
        availableNetworks[0].name = currentWifiNetwork;
        if (model === 'iphonefold') { foldButton.classList.remove('hidden'); if (isFolded) { isFolded = false; iphoneDevice.classList.remove('folded'); foldButton.innerHTML = '📱'; } }
        else { foldButton.classList.add('hidden'); if (isFolded) { isFolded = false; iphoneDevice.classList.remove('folded'); } }
        showToast(`Đã chuyển sang ${model === 'iphone17' ? 'iPhone 17' : model === 'iphone15' ? 'iPhone 15' : model === 'iphone14' ? 'iPhone 14' : 'iPhone Fold'}`, 1200);
    }
    
    function toggleFold() { if (currentModel !== 'iphonefold') return; isFolded = !isFolded; if (isFolded) { iphoneDevice.classList.add('folded'); foldButton.innerHTML = '📱➡️'; } else { iphoneDevice.classList.remove('folded'); foldButton.innerHTML = '📱⬅️'; } showToast(isFolded ? 'Đã gập' : 'Đã mở', 800); }
    function toggleControlCenter() { if (controlCenterOpen) { controlCenter.classList.remove('active'); controlCenterOpen = false; } else { controlCenter.classList.add('active'); controlCenterOpen = true; } }
    
    function transitionToScreen(newScreen, renderFunc) {
        if (animationInProgress) return;
        animationInProgress = true;
        if (controlCenterOpen) { controlCenter.classList.remove('active'); controlCenterOpen = false; }
        const oldDiv = screenContainer.querySelector('.screen');
        if (oldDiv) {
            oldDiv.classList.add('screen-exit');
            setTimeout(() => {
                oldDiv.classList.add('screen-exit-active');
                setTimeout(() => {
                    screenContainer.innerHTML = '';
                    const newDiv = document.createElement('div');
                    newDiv.className = 'screen screen-enter';
                    newDiv.innerHTML = renderFunc();
                    screenContainer.appendChild(newDiv);
                    newDiv.offsetHeight;
                    newDiv.classList.remove('screen-enter');
                    newDiv.classList.add('screen-enter-active');
                    currentScreen = newScreen;
                    animationInProgress = false;
                    attachEventsForScreen(newScreen);
                }, 260);
            }, 15);
        } else {
            const newDiv = document.createElement('div');
            newDiv.className = 'screen screen-enter';
            newDiv.innerHTML = renderFunc();
            screenContainer.appendChild(newDiv);
            newDiv.offsetHeight;
            newDiv.classList.remove('screen-enter');
            newDiv.classList.add('screen-enter-active');
            currentScreen = newScreen;
            animationInProgress = false;
            attachEventsForScreen(newScreen);
        }
    }
    
    // ==================== RENDER FUNCTIONS ====================
    function renderLock() {
        const now = new Date();
        return `<div class="lock-screen"><div></div><div><div class="lock-time">${now.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' })}</div><div class="lock-date">${now.toLocaleDateString('vi-VN', { weekday: 'long', day: 'numeric', month: 'numeric' })}</div><div class="lock-notification"><div class="lock-notification-title">🎵 Nhạc đang phát</div><div class="lock-notification-text">${songs[currentSongIndex].name} - ${songs[currentSongIndex].artist}</div></div></div><div class="swipe-to-unlock" id="unlockArea"><div class="swipe-indicator"></div><span>Vui tốt lên để mở khóa</span></div></div>`;
    }
    
    function renderHome() {
        const now = new Date();
        return `<div class="home-screen"><div class="status-bar"><span class="time">${now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span><span>📶 🔋 100%</span></div>
        <div class="widget-row" style="display:flex; gap:12px; padding:12px 16px; background:white; margin:8px 16px; border-radius:16px"><div class="widget-card" style="flex:1; text-align:center; padding:12px; background:#F2F2F6; border-radius:14px">☀️ ${now.getHours()}:${now.getMinutes()}</div><div class="widget-card" style="flex:1; text-align:center; padding:12px; background:#F2F2F6; border-radius:14px">🌡️ 32°C</div><div class="widget-card" style="flex:1; text-align:center; padding:12px; background:#F2F2F6; border-radius:14px">📝 ${notes[0]?.title || 'Ghi chú'}</div></div>
        <div class="app-grid">${apps.map(app => `<div class="app-icon" data-app="${app.id}"><div class="icon-bg" style="background:${app.bg};">${app.icon}</div><span class="app-name">${app.name}</span></div>`).join('')}</div>
        <div class="dock">${dockApps.map(app => `<div class="dock-icon" data-app="${app.id}"><div class="icon-bg" style="background:${app.bg};">${app.icon}</div><span class="app-name">${app.name}</span></div>`).join('')}</div></div>`;
    }
    
    function renderSettings() {
        return `<div class="settings-screen"><div class="settings-header"><div class="back-btn" id="backFromSettings">←</div><h1>Cài đặt</h1></div>
        <div class="settings-group"><div class="settings-item" data-action="wifi"><div class="settings-left"><div class="settings-icon">📶</div><div class="settings-label">Wi-Fi</div></div><div class="settings-value">${wifiEnabled ? currentWifiNetwork : 'Tắt'}</div></div>
        <div class="settings-item" data-action="bluetooth"><div class="settings-left"><div class="settings-icon">🔷</div><div class="settings-label">Bluetooth</div></div><div class="settings-value">${bluetoothEnabled ? 'Đã bật' : 'Tắt'}</div></div>
        <div class="settings-item" data-action="cellular"><div class="settings-left"><div class="settings-icon">📱</div><div class="settings-label">Di động</div></div><div class="settings-value">${cellularEnabled ? 'Bật' : 'Tắt'}</div></div></div>
        <div class="settings-group"><div class="settings-item" data-action="airplane"><div class="settings-left"><div class="settings-icon">✈️</div><div class="settings-label">Chế độ máy bay</div></div><div class="toggle-switch ${airplaneMode ? 'active' : ''}" data-toggle="airplane"></div></div>
        <div class="settings-item" data-action="darkmode"><div class="settings-left"><div class="settings-icon">🌙</div><div class="settings-label">Chế độ tối</div></div><div class="toggle-switch ${darkMode ? 'active' : ''}" data-toggle="darkmode"></div></div>
        <div class="settings-item" data-action="brightness"><div class="settings-left"><div class="settings-icon">☀️</div><div class="settings-label">Độ sáng</div></div><div class="settings-value">80%</div></div></div>
        <div class="settings-group"><div class="settings-item" data-action="notifications"><div class="settings-left"><div class="settings-icon">🔔</div><div class="settings-label">Thông báo</div></div><div class="settings-value">Bật</div></div>
        <div class="settings-item" data-action="sound"><div class="settings-left"><div class="settings-icon">🔊</div><div class="settings-label">Âm thanh & Haptics</div></div></div>
        <div class="settings-item" data-action="battery"><div class="settings-left"><div class="settings-icon">🔋</div><div class="settings-label">Pin</div></div><div class="settings-value">98% - Tốt</div></div>
        <div class="settings-item" data-action="storage"><div class="settings-left"><div class="settings-icon">💾</div><div class="settings-label">Bộ nhớ</div></div><div class="settings-value">128/256 GB</div></div></div>
        <div class="settings-group"><div class="settings-item" data-action="about"><div class="settings-left"><div class="settings-icon">ℹ️</div><div class="settings-label">Giới thiệu</div></div><div class="settings-value">${currentModel === 'iphone17' ? 'iPhone 17 Pro Max' : currentModel === 'iphone15' ? 'iPhone 15 Pro' : currentModel === 'iphone14' ? 'iPhone 14 Pro' : 'iPhone Fold'} | iOS 18</div></div></div></div>`;
    }
    
    function renderWifi() {
        const connectedNet = availableNetworks.find(n => n.connected);
        const otherNetworks = availableNetworks.filter(n => !n.connected);
        return `<div class="wifi-screen"><div class="wifi-header"><div class="back-btn" id="backFromWifi">←</div><h1>Wi-Fi</h1></div><div class="wifi-toggle-card"><div class="settings-item" id="wifiMasterToggle"><div class="settings-left"><div class="settings-icon">📶</div><div class="settings-label">Wi-Fi</div></div><div class="toggle-switch ${wifiEnabled ? 'active' : ''}" id="wifiToggle"></div></div></div>${wifiEnabled ? `<div class="wifi-section-title">MẠNG CỦA TÔI</div><div class="wifi-list"><div class="wifi-network" data-network="${connectedNet.name}"><div class="wifi-info"><div class="wifi-icon">📶</div><div><div class="wifi-name">${connectedNet.name} ${connectedNet.icon ? '<span style="font-size:12px">' + connectedNet.icon + '</span>' : ''}${connectedNet.secured ? '<span class="wifi-lock">🔒</span>' : ''}</div></div></div><div class="wifi-status wifi-connected">Đã kết nối</div></div></div><div class="wifi-section-title">CÁC MẠNG KHÁC</div><div class="wifi-list">${otherNetworks.map(net => `<div class="wifi-network" data-network="${net.name}"><div class="wifi-info"><div class="wifi-icon">📶</div><div><div class="wifi-name">${net.name} ${net.icon ? '<span style="font-size:12px">' + net.icon + '</span>' : ''}${net.secured ? '<span class="wifi-lock">🔒</span>' : ''}</div></div></div><div class="wifi-status"></div></div>`).join('')}</div><div style="margin: 16px; text-align: center; color: #8E8E93; font-size: 13px;">Các mạng Wi-Fi khác sẽ hiển thị khi có sẵn</div>` : `<div style="margin: 32px 16px; text-align: center; color: #8E8E93; padding: 40px 0;"><div style="font-size: 48px; margin-bottom: 16px;">📶</div><div>Wi-Fi đã tắt</div><div style="font-size: 13px; margin-top: 8px;">Bật Wi-Fi để xem danh sách mạng</div></div>`}</div>`;
    }
    
    function renderMessages() {
        const msgs = messages.map(m => `<div class="message ${m.sender}">${m.text}<div class="message-time">${m.time}</div></div>`).join('');
        return `<div class="messages-screen"><div class="messages-header"><div class="back-btn" id="backFromMessages">←</div><h1>Tin nhắn</h1></div><div class="chat-container" id="chatContainer">${msgs}</div><div class="input-area"><input type="text" id="messageInput" placeholder="iMessage"><button class="send-btn" id="sendBtn">➤</button></div></div>`;
    }
    
    function renderMusic() {
        const song = songs[currentSongIndex];
        const curMin = Math.floor(currentTime/60), curSec = Math.floor(currentTime%60);
        const durMin = Math.floor(songDuration/60), durSec = Math.floor(songDuration%60);
        const percent = (currentTime/songDuration)*100;
        return `<div class="music-screen"><div class="music-header"><div class="back-btn" id="backFromMusic">←</div><h1>Music</h1></div>
        <div class="music-player"><div class="music-cover">🎵</div><div class="music-title">${song.name}</div><div class="music-artist">${song.artist}</div>

        <div class="music-time"><span>${curMin}:${curSec<10?'0'+curSec:curSec}</span><span>${durMin}:${durSec<10?'0'+durSec:durSec}</span></div></div>
        <div class="song-list">${songs.map((s,idx) => `<div class="song-item" data-song-index="${idx}"><div><div style="font-weight:500">${s.name}</div><div style="font-size:12px;color:#8E8E93">${s.artist}</div></div>${idx===currentSongIndex && isPlaying ? '<div style="color:#007aff">🎵</div>' : ''}</div>`).join('')}</div></div>`;
    }
    
    function renderCalculator() {
        return `<div class="calculator-screen"><div class="calculator"><div class="calc-display" id="calcDisplay">${calcDisplay}</div><div class="calc-buttons"><div class="calc-btn clear" data-value="C">C</div><div class="calc-btn" data-value="%">%</div><div class="calc-btn" data-value="/">/</div><div class="calc-btn operator" data-value="*">×</div><div class="calc-btn" data-value="7">7</div><div class="calc-btn" data-value="8">8</div><div class="calc-btn" data-value="9">9</div><div class="calc-btn operator" data-value="-">-</div><div class="calc-btn" data-value="4">4</div><div class="calc-btn" data-value="5">5</div><div class="calc-btn" data-value="6">6</div><div class="calc-btn operator" data-value="+">+</div><div class="calc-btn" data-value="1">1</div><div class="calc-btn" data-value="2">2</div><div class="calc-btn" data-value="3">3</div><div class="calc-btn operator" data-value="=">=</div><div class="calc-btn" data-value="0">0</div><div class="calc-btn" data-value=".">.</div></div></div><div class="back-btn" id="backFromCalc" style="position:absolute; top:16px; left:16px;">←</div></div>`;

    function renderClock() {
        const now = new Date();
        return `<div class="clock-screen"><div class="clock-header"><div class="back-btn" id="backFromClock">←</div><h1>Đồng hồ</h1></div><div class="clock-display" id="currentClockTime">${now.toLocaleTimeString()}</div><div class="world-clock"><div>🇻🇳 TP.HCM: ${now.toLocaleTimeString()}</div><div>🇯🇵 Tokyo: ${new Date(now.getTime()+2*3600000).toLocaleTimeString()}</div><div>🇺🇸 New York: ${new Date(now.getTime()-11*3600000).toLocaleTimeString()}</div></div><div class="timer-control"><button class="timer-btn" id="timer5s">Timer 5s</button><button class="timer-btn" id="timerStop">Dừng</button></div><div id="timerDisplay" style="text-align:center;margin:16px">Timer: 0s</div><div class="stopwatch"><div class="stopwatch-display" id="stopwatchDisplay">00:00:00</div><button class="timer-btn" id="stopwatchStart">Bắt đầu</button><button class="timer-btn" id="stopwatchReset">Đặt lại</button></div></div>`;
    }
    
    function renderCamera() {
        return `<div class="camera-preview"><div style="position:absolute;top:16px;left:16px;"><div class="back-btn" id="backFromCamera" style="color:white;">←</div></div><div style="font-size:80px;">📷</div><div style="margin-top:16px;">Camera giả lập</div><button id="takePhotoBtn" style="margin-top:32px;padding:12px 28px;border-radius:40px;background:#007aff;color:white;border:none;">Chụp ảnh</button><button id="selfieBtn" style="margin-top:16px;padding:12px 28px;border-radius:40px;background:#ff9500;color:white;border:none;">Selfie</button></div>`;

    // ==================== EVENT HANDLERS ====================
    function attachEventsForScreen(screen) {
        if (screen === 'lock') {
            document.getElementById('unlockArea')?.addEventListener('click', () => transitionToScreen('home', renderHome));
        } else if (screen === 'home') {
            document.querySelectorAll('.app-icon, .dock-icon').forEach(el => {
                el.addEventListener('click', (e) => {
                    const app = el.getAttribute('data-app');
                    if (app === 'settings') transitionToScreen('settings', renderSettings);
                    else if (app === 'messages') transitionToScreen('messages', renderMessages);
                    else if (app === 'music') transitionToScreen('music', renderMusic);
                    else if (app === 'games') transitionToScreen('games', renderGames);
                    else if (app === 'notes') transitionToScreen('notes', renderNotes);
                    else if (app === 'calculator') transitionToScreen('calculator', renderCalculator);
                    else if (app === 'clock') transitionToScreen('clock', renderClock);
                    else if (app === 'camera') transitionToScreen('camera', renderCamera);
                    else if (app === 'photos') transitionToScreen('photos', renderPhotos);
                    else if (app === 'weather') transitionToScreen('weather', renderWeather);
                    else if (app === 'calendar') transitionToScreen('calendar', renderCalendar);
                    else if (app === 'phone') transitionToScreen('phone', renderPhone);
                    else if (app === 'utilities') transitionToScreen('utilities', renderUtilities);
                    else showToast(`📱 ${el.querySelector('.app-name')?.innerText}`, 1000);
                });
            });
        } else if (screen === 'settings') {
            document.getElementById('backFromSettings')?.addEventListener('click', () => transitionToScreen('home', renderHome));
            document.querySelector('[data-action="wifi"]')?.addEventListener('click', () => transitionToScreen('wifi', renderWifi));
            document.querySelector('[data-action="bluetooth"]')?.addEventListener('click', () => { bluetoothEnabled = !bluetoothEnabled; showToast(`Bluetooth ${bluetoothEnabled?'bật':'tắt'}`,1000); transitionToScreen('settings', renderSettings); });
            document.querySelector('[data-action="cellular"]')?.addEventListener('click', () => { cellularEnabled = !cellularEnabled; showToast(`Di động ${cellularEnabled?'bật':'tắt'}`,1000); transitionToScreen('settings', renderSettings); });
            document.querySelector('[data-toggle="airplane"]')?.addEventListener('click', (e) => { e.stopPropagation(); airplaneMode = !airplaneMode; if(airplaneMode) { wifiEnabled=false; bluetoothEnabled=false; cellularEnabled=false; showToast('✈️ Bật máy bay',1000); } else { wifiEnabled=true; bluetoothEnabled=true; cellularEnabled=true; showToast('✈️ Tắt máy bay',1000); } transitionToScreen('settings', renderSettings); });
            document.querySelector('[data-toggle="darkmode"]')?.addEventListener('click', (e) => { e.stopPropagation(); toggleDarkMode(); transitionToScreen('settings', renderSettings); });
            document.querySelector('[data-action="notifications"]')?.addEventListener('click', () => showToast('🔔 Trung tâm thông báo', 900));
            document.querySelector('[data-action="sound"]')?.addEventListener('click', () => showToast('🔊 Âm thanh hệ thống', 900));
            document.querySelector('[data-action="battery"]')?.addEventListener('click', () => showToast('🔋 Pin: 98% - Sạc nhanh', 900));
            document.querySelector('[data-action="storage"]')?.addEventListener('click', () => showToast('💾 Đã dùng 128GB / 256GB', 1200));
            document.querySelector('[data-action="about"]')?.addEventListener('click', () => showToast(`ℹ️ ${currentModel === 'iphone17' ? 'iPhone 17 Pro Max' : currentModel === 'iphone15' ? 'iPhone 15 Pro' : currentModel === 'iphone14' ? 'iPhone 14 Pro' : 'iPhone Fold'} | iOS 18`, 1200));
        } else if (screen === 'wifi') {
            document.getElementById('backFromWifi')?.addEventListener('click', () => transitionToScreen('settings', renderSettings));
            document.getElementById('wifiToggle')?.addEventListener('click', (e) => { e.stopPropagation(); wifiEnabled = !wifiEnabled; if(!wifiEnabled) { availableNetworks.forEach(n=>n.connected=false); showToast('Wi-Fi đã tắt',1000); } else showToast('Wi-Fi đã bật',1000); transitionToScreen('wifi', renderWifi); });
            document.querySelectorAll('.wifi-network').forEach(el => {
                el.addEventListener('click', () => { if(!wifiEnabled) { showToast('Bật Wi-Fi trước',1000); return; } const netName = el.getAttribute('data-network'); availableNetworks.forEach(n=>n.connected=(n.name===netName)); showToast(`✅ Đã kết nối ${netName}`, 1200); transitionToScreen('wifi', renderWifi); });
            });
        } else if (screen === 'messages') {
            document.getElementById('backFromMessages')?.addEventListener('click', () => transitionToScreen('home', renderHome));
            const input = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const addMsg = (text, sender) => { messages.push({ text, sender, time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) }); transitionToScreen('messages', renderMessages); setTimeout(()=>document.getElementById('chatContainer')?.scrollTo(0,9999),80); };
            const send = () => { const txt = input.value.trim(); if(!txt) return; addMsg(txt,'sent'); input.value=''; setTimeout(()=>{ const replies = ["Ồ thú vị! 😊","Mình hiểu rồi.","Cảm ơn bạn!","40+ tính năng hay quá!","Thử game Flappy Bird đi!"]; addMsg(replies[Math.floor(Math.random()*replies.length)],'received'); },900); };
            sendBtn?.addEventListener('click', send);
            input?.addEventListener('keypress', e => e.key==='Enter' && send());
        } else if (screen === 'music') {
            document.getElementById('backFromMusic')?.addEventListener('click', () => transitionToScreen('home', renderHome));
            const playPause = document.getElementById('playPauseBtn');
            const prev = document.getElementById('prevBtn');
            const next = document.getElementById('nextBtn');
            const progressContainer = document.getElementById('musicProgress');
            const updateMusic = () => transitionToScreen('music', renderMusic);
            playPause?.addEventListener('click', () => { isPlaying = !isPlaying; if(isPlaying) startWaveAnimation(); updateMusic(); });
            prev?.addEventListener('click', () => { currentSongIndex = (currentSongIndex-1+songs.length)%songs.length; songDuration = songs[currentSongIndex].duration; currentTime=0; isPlaying=true; startWaveAnimation(); updateMusic(); showToast(songs[currentSongIndex].name,1000); });
            next?.addEventListener('click', () => { currentSongIndex = (currentSongIndex+1)%songs.length; songDuration = songs[currentSongIndex].duration; currentTime=0; isPlaying=true; startWaveAnimation(); updateMusic(); showToast(songs[currentSongIndex].name,1000); });
            progressContainer?.addEventListener('click', (e) => { const rect = progressContainer.getBoundingClientRect(); const percent = (e.clientX - rect.left)/rect.width; currentTime = percent * songDuration; updateMusic(); });
            document.querySelectorAll('.song-item').forEach(item => { item.addEventListener('click', () => { currentSongIndex = parseInt(item.getAttribute('data-song-index')); songDuration = songs[currentSongIndex].duration; currentTime=0; isPlaying=true; startWaveAnimation(); updateMusic(); }); });
            if(isPlaying) setInterval(() => { if(isPlaying && currentScreen==='music') { currentTime = Math.min(currentTime+1, songDuration); if(currentTime>=songDuration) { currentSongIndex = (currentSongIndex+1)%songs.length; songDuration = songs[currentSongIndex].duration; currentTime=0; updateMusic(); } else { const bar = document.getElementById('progressBar'); if(bar) bar.style.width = (currentTime/songDuration)*100 + '%'; const timeSpan = document.querySelector('.music-time span:first-child'); if(timeSpan) { const mins=Math.floor(currentTime/60), secs=Math.floor(currentTime%60); timeSpan.textContent=`${mins}:${secs<10?'0'+secs:secs}`; } } } }, 1000);
        } else if (screen === 'calculator') {
            document.getElementById('backFromCalc')?.addEventListener('click', () => transitionToScreen('home', renderHome));
            const display = document.getElementById('calcDisplay'); let cur='0', prev=null, op=null, reset=false; const update = () => { if(display) display.innerText = cur; };
            document.querySelectorAll('.calc-btn').forEach(btn => { btn.addEventListener('click', () => { const val = btn.getAttribute('data-value'); if(val==='C') { cur='0'; prev=null; op=null; reset=false; update(); return; } if(val==='=') { if(op && prev!==null) { let a=parseFloat(prev), b=parseFloat(cur); if(op==='+') cur=(a+b).toString(); else if(op==='-') cur=(a-b).toString(); else if(op==='*') cur=(a*b).toString(); else if(op==='/') cur=(a/b).toString(); prev=null; op=null; reset=true; update(); } return; } if(['+','-','*','/','%'].includes(val)) { if(prev===null) { prev=cur; op=val; reset=true; } else if(op && !reset) { let a=parseFloat(prev), b=parseFloat(cur); if(op==='+') cur=(a+b).toString(); else if(op==='-') cur=(a-b).toString(); else if(op==='*') cur=(a*b).toString(); else if(op==='/') cur=(a/b).toString(); prev=cur; op=val; reset=true; update(); } else { op=val; reset=true; } return; } if(reset) { cur=val; reset=false; } else cur=(cur==='0' && val!=='.') ? val : cur+val; update(); }); });
        } else if (screen === 'clock') {
            document.getElementById('backFromClock')?.addEventListener('click', () => transitionToScreen('home', renderHome));
            const timerDisplay = document.getElementById('timerDisplay');
            const timer5s = document.getElementById('timer5s');
            const timerStop = document.getElementById('timerStop');
            timer5s?.addEventListener('click', () => { if(timerIntervalId) clearInterval(timerIntervalId); timerSeconds=5; timerDisplay.innerText=`Timer: 5s`; timerIntervalId=setInterval(()=>{ if(timerSeconds<=1){ clearInterval(timerIntervalId); timerDisplay.innerText='Timer: 0s'; showToast('⏰ Hết giờ!',1000); } else { timerSeconds--; timerDisplay.innerText=`Timer: ${timerSeconds}s`; } },1000); });
            timerStop?.addEventListener('click', () => { if(timerIntervalId) clearInterval(timerIntervalId); timerSeconds=0; timerDisplay.innerText='Timer: 0s'; });
            const stopwatchDisplay = document.getElementById('stopwatchDisplay');
            const stopwatchStart = document.getElementById('stopwatchStart');
            const stopwatchReset = document.getElementById('stopwatchReset');
            stopwatchStart?.addEventListener('click', () => { if(stopwatchIntervalId) clearInterval(stopwatchIntervalId); stopwatchIntervalId=setInterval(()=>{ stopwatchSeconds++; const h=Math.floor(stopwatchSeconds/3600); const m=Math.floor((stopwatchSeconds%3600)/60); const s=stopwatchSeconds%60; stopwatchDisplay.innerText=`${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; },1000); });
            stopwatchReset?.addEventListener('click', () => { if(stopwatchIntervalId) clearInterval(stopwatchIntervalId); stopwatchSeconds=0; stopwatchDisplay.innerText='00:00:00'; });
            setInterval(()=>{ const now=new Date(); const el=document.getElementById('currentClockTime'); if(el) el.innerText=now.toLocaleTimeString(); },1000);

        } else if (screen === 'games') {
            document.getElementById('backFromGames')?.addEventListener('click', () => transitionToScreen('home', renderHome));
            document.querySelectorAll('.game-card').forEach(card => {
                card.addEventListener('click', () => {
                    const game = card.getAttribute('data-game');
                    if (game === 'flappy') transitionToScreen('flappy', renderFlappyBird);
                    else if (game === 'tictac') transitionToScreen('tictac', renderTicTac);
                    else if (game === 'memory') transitionToScreen('memory', renderMemory);
                    else if (game === 'guess') transitionToScreen('guess', renderGuessNumber);
                });
            });
        } else if (screen === 'flappy') {
            document.getElementById('backFromFlappy')?.addEventListener('click', () => transitionToScreen('games', renderGames));
            let gameRunning = false, birdTop = 200, velocity = 0, gravity = 0.8, jump = -8, score = 0, pipeX = 380, pipeGap = 150, pipeHeight = 150;
            const bird = document.getElementById('flappyBird');
            const scoreSpan = document.getElementById('flappyScore');
            const startBtn = document.getElementById('startFlappy');
            const gameArea = document.getElementById('flappyGame');
            function updateGame() {
                if (!gameRunning) return;
                velocity += gravity;
                birdTop += velocity;
                if (birdTop <= 0) { birdTop = 0; velocity = 0; }
                if (birdTop >= 360) endGame();
                bird.style.top = birdTop + 'px';
                pipeX -= 3;
                if (pipeX < -60) { pipeX = 380; score++; scoreSpan.innerText = score; pipeHeight = Math.random() * 200 + 80; }
                const pipes = document.querySelectorAll('.flappy-pipe');
                pipes.forEach(p => p.remove());
                const topPipe = document.createElement('div'); topPipe.className = 'flappy-pipe'; topPipe.style.position = 'absolute'; topPipe.style.width = '60px'; topPipe.style.height = pipeHeight + 'px'; topPipe.style.background = '#228B22'; topPipe.style.left = pipeX + 'px'; topPipe.style.top = '0'; gameArea.appendChild(topPipe);
                const bottomPipe = document.createElement('div'); bottomPipe.className = 'flappy-pipe'; bottomPipe.style.position = 'absolute'; bottomPipe.style.width = '60px'; bottomPipe.style.height = (400 - pipeHeight - pipeGap) + 'px'; bottomPipe.style.background = '#228B22'; bottomPipe.style.left = pipeX + 'px'; bottomPipe.style.bottom = '0'; gameArea.appendChild(bottomPipe);
                const birdRect = { x: 80, y: birdTop, w: 40, h: 40 };
                if ((birdRect.x < pipeX + 60 && birdRect.x + 40 > pipeX && birdRect.y < pipeHeight) || (birdRect.x < pipeX + 60 && birdRect.x + 40 > pipeX && birdRect.y + 40 > pipeHeight + pipeGap)) endGame();
            }
            function endGame() { gameRunning = false; if(flappyGameLoop) clearInterval(flappyGameLoop); showToast('Game Over! Điểm: ' + score, 1500); }
            function jumpGame() { if (gameRunning) velocity = jump; }
            startBtn?.addEventListener('click', () => { gameRunning = true; birdTop = 200; velocity = 0; score = 0; scoreSpan.innerText = '0'; pipeX = 380; pipeHeight = 150; if(flappyGameLoop) clearInterval(flappyGameLoop); flappyGameLoop = setInterval(updateGame, 20); });
            gameArea?.addEventListener('click', jumpGame);
        } else if (screen === 'tictac') {
            document.getElementById('backFromTictac')?.addEventListener('click', () => transitionToScreen('games', renderGames));
            let board = Array(9).fill(''), turn = 'X', gameEnd = false;
            function checkWin() { const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]]; for(let w of wins) { if(board[w[0]] && board[w[0]]===board[w[1]] && board[w[0]]===board[w[2]]) return board[w[0]]; } if(board.every(c=>c!=='')) return 'draw'; return null; }
            function updateUI() { document.querySelectorAll('.tictac-cell').forEach((cell,i)=> { cell.innerText = board[i]; }); const winner = checkWin(); const status = document.getElementById('tictacStatus'); if(winner==='X') status.innerText = '🏆 X thắng!'; else if(winner==='O') status.innerText = '🏆 O thắng!'; else if(winner==='draw') status.innerText = '🤝 Hòa!'; else status.innerText = `Lượt: ${turn}`; }
            document.querySelectorAll('.tictac-cell').forEach(cell => { cell.addEventListener('click', () => { const idx = parseInt(cell.getAttribute('data-cell')); if(board[idx] || gameEnd) return; board[idx] = turn; turn = turn==='X'?'O':'X'; updateUI(); if(checkWin()) gameEnd=true; }); });
            document.getElementById('resetTictac')?.addEventListener('click', () => { board = Array(9).fill(''); turn = 'X'; gameEnd = false; updateUI(); });
            updateUI();
        } else if (screen === 'memory') {
            document.getElementById('backFromMemory')?.addEventListener('click', () => transitionToScreen('games', renderGames));
            function shuffle(arr) { for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }
            let cards = shuffle([...memoryCards]);
            let flipped = [], matched = [];
            function updateMemoryUI() {
                document.querySelectorAll('.memory-card').forEach((card,i)=>{ const val = cards[i]; if(flipped.includes(i)||matched.includes(i)) card.innerText = val; else card.innerText = '?'; card.style.background = matched.includes(i)?'#34C759':(flipped.includes(i)?'white':'#007aff'); });
                if(matched.length === cards.length) showToast('🎉 Chiến thắng!', 1500);
            }
            document.querySelectorAll('.memory-card').forEach(card => { card.addEventListener('click', () => { const idx = parseInt(card.getAttribute('data-card')); if(flipped.includes(idx) || matched.includes(idx) || flipped.length===2) return; flipped.push(idx); updateMemoryUI(); if(flipped.length===2) { const [a,b] = flipped; if(cards[a]===cards[b]) { matched.push(a,b); flipped=[]; updateMemoryUI(); } else { setTimeout(()=>{ flipped=[]; updateMemoryUI(); },800); } } }); });
            document.getElementById('resetMemory')?.addEventListener('click', () => { cards = shuffle([...memoryCards]); flipped=[]; matched=[]; updateMemoryUI(); });
            updateMemoryUI();
        } else if (screen === 'guess') {
            document.getElementById('backFromGuess')?.addEventListener('click', () => transitionToScreen('games', renderGames));
            let secret = Math.floor(Math.random()*100)+1;
            const guessInput = document.getElementById('guessInput');
            const guessBtn = document.getElementById('guessBtn');
            const guessMsg = document.getElementById('guessMessage');
            const newBtn = document.getElementById('newGuess');
            guessBtn?.addEventListener('click', () => { const val = parseInt(guessInput.value); if(isNaN(val)) guessMsg.innerText = 'Nhập số!'; else if(val<1||val>100) guessMsg.innerText = 'Từ 1-100!'; else if(val===secret) { guessMsg.innerText = '🎉 Chính xác! Bạn thắng!'; secret = Math.floor(Math.random()*100)+1; } else if(val<secret) guessMsg.innerText = '📈 Cao hơn!'; else guessMsg.innerText = '📉 Thấp hơn!'; });
            newBtn?.addEventListener('click', () => { secret = Math.floor(Math.random()*100)+1; guessMsg.innerText = 'Số mới! Bắt đầu đoán!'; guessInput.value = ''; });
        } else if (screen === 'utilities') {
            document.getElementById('backFromUtilities')?.addEventListener('click', () => transitionToScreen('home', renderHome));
            document.querySelector('[data-action="bmi"]')?.addEventListener('click', () => transitionToScreen('bmi', renderBMI));
            document.querySelector('[data-action="qr"]')?.addEventListener('click', () => transitionToScreen('qr', renderQR));
            document.querySelector('[data-action="advice"]')?.addEventListener('click', () => { const advice = ['💪 Học tập chăm chỉ!','😊 Cười lên nào!','🌟 Bạn làm được!','🎯 Đặt mục tiêu mới!']; showToast(advice[Math.floor(Math.random()*advice.length)], 1500); });
            document.querySelector('[data-action="random"]')?.addEventListener('click', () => showToast(`🎲 Số ngẫu nhiên: ${Math.floor(Math.random()*100)+1}`, 1200));
            document.querySelector('[data-action="color"]')?.addEventListener('click', () => { const color = '#'+Math.floor(Math.random()*16777215).toString(16); showToast(`🎨 Màu: ${color}`, 1200); document.body.style.backgroundColor = color; });
            document.querySelector('[data-action="wish"]')?.addEventListener('click', () => { const wishes = ['Chúc bạn may mắn!','Hạnh phúc tràn đầy!','Thành công rực rỡ!','Vui vẻ mỗi ngày!']; showToast(wishes[Math.floor(Math.random()*wishes.length)], 1500); });
            document.querySelector('[data-action="currency"]')?.addEventListener('click', () => showToast('💰 USD: 25,500 VND | EUR: 27,800 VND | JPY: 170 VND', 2000));
            document.getElementById('addTodo')?.addEventListener('click', () => { const input = document.getElementById('newTodo'); const text = input.value.trim(); if(text) { todos.push({ id: Date.now(), text, done: false }); transitionToScreen('utilities', renderUtilities); } });
            document.querySelectorAll('.todo-check').forEach(ch => { ch.addEventListener('click', (e) => { const id = parseInt(e.target.getAttribute('data-id')); const todo = todos.find(t=>t.id===id); if(todo) todo.done = !todo.done; transitionToScreen('utilities', renderUtilities); }); });
        } else if (screen === 'bmi') {
            document.getElementById('backFromBMI')?.addEventListener('click', () => transitionToScreen('utilities', renderUtilities));
            document.getElementById('calcBMI')?.addEventListener('click', () => { const h = parseFloat(document.getElementById('height').value)/100; const w = parseFloat(document.getElementById('weight').value); if(h&&w) { const bmi = w/(h*h); let msg = ''; if(bmi<18.5) msg='Thiếu cân'; else if(bmi<25) msg='Bình thường'; else if(bmi<30) msg='Thừa cân'; else msg='Béo phì'; document.getElementById('bmiResult').innerHTML = `BMI: ${bmi.toFixed(1)}<br>${msg}`; } });
        } else if (screen === 'qr') {
            document.getElementById('backFromQR')?.addEventListener('click', () => transitionToScreen('utilities', renderUtilities));
            document.getElementById('generateQR')?.addEventListener('click', () => { const text = document.getElementById('qrText').value; if(text) document.getElementById('qrResult').innerHTML = `📱 QR: "${text}"`; });
        }
    }
    
    function initControlCenter() {
        document.getElementById('closeControlCenter')?.addEventListener('click', () => { controlCenter.classList.remove('active'); controlCenterOpen = false; });
        let touchStartY = 0;
        iphoneDevice.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; });
        iphoneDevice.addEventListener('touchend', (e) => { const endY = e.changedTouches[0].clientY; if (endY - touchStartY > 50 && endY > iphoneDevice.clientHeight - 90) toggleControlCenter(); });
        document.querySelectorAll('.control-item').forEach(item => { item.addEventListener('click', () => { const ctrl = item.getAttribute('data-control'); if(ctrl==='wifi'){ wifiEnabled=!wifiEnabled; showToast(`Wi-Fi ${wifiEnabled?'bật':'tắt'}`,1000); } else if(ctrl==='bluetooth'){ bluetoothEnabled=!bluetoothEnabled; showToast(`Bluetooth ${bluetoothEnabled?'bật':'tắt'}`,1000); } else if(ctrl==='airplane'){ airplaneMode=!airplaneMode; showToast(airplaneMode?'✈️ Bật máy bay':'✈️ Tắt máy bay',1000); } else if(ctrl==='flashlight'){ flashlightOn=!flashlightOn; showToast(flashlightOn?'🔦 Đèn pin bật':'🔦 Đèn pin tắt',900); } else if(ctrl==='darkmode'){ toggleDarkMode(); } else if(ctrl==='music'){ transitionToScreen('music', renderMusic); } }); });
        document.getElementById('brightnessSlider')?.addEventListener('input', (e) => { document.querySelectorAll('.screen').forEach(s => s.style.filter = `brightness(${40 + e.target.value/1.4}%)`); });
        document.getElementById('volumeSlider')?.addEventListener('input', (e) => showToast(`🔊 Âm lượng: ${e.target.value}%`, 500));
    }
    
    document.querySelectorAll('.model-btn').forEach(btn => { btn.addEventListener('click', () => { const model = btn.getAttribute('data-model'); setModel(model); document.querySelectorAll('.model-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); if(currentScreen==='lock') transitionToScreen('lock', renderLock); else if(currentScreen==='settings') transitionToScreen('settings', renderSettings); }); });
    
    transitionToScreen('lock', renderLock);
    homeIndicator.addEventListener('click', () => { if(currentScreen !== 'lock') transitionToScreen('home', renderHome); });
    foldButton.addEventListener('click', toggleFold);
    initControlCenter();
    startWaveAnimation();
    document.querySelector('.model-btn[data-model="iphone15"]').classList.add('active');
</script>
</body>
</html>
